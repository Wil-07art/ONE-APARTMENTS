<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One Apartments - Cobro suite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>ONE APARTMENTS</h1>
</div>

<div class="sede-container" id="botonesSede">
    <button class="btn-sede active" onclick="cambiarSede('sede1', this)">Lleras</button>
    <button class="btn-sede" onclick="cambiarSede('sede2', this)">Laureles</button>
    <button class="btn-sede" onclick="cambiarSede('sede3', this)">Provenza</button>
    <button class="btn-sede" onclick="cambiarSede('Apto', this)">Apto</button>
</div>

<div class="container">
    <div class="input-group">
        <input type="text" id="huesped" placeholder="Nombre Huésped">
        <input type="text" id="habitacion" placeholder="Suite #">
    </div>

    <button class="btn-damage-toggle" onclick="toggleDanos()"> Cobro de Daños</button>
    
   <div id="seccionDanos" class="danos-submenu hidden">
    <h4>Cargos por Daños / Faltantes</h4>
    <div id="listaDanosCheck">
        </div>
    <div class="custom-damage">
        <input type="text" id="otroDanoNombre" placeholder="Otro (ej. Control TV)">
        <input type="number" id="otroDanoPrecio" placeholder="Precio $">
        <button onclick="agregarDanoPersonalizado()">Agregar</button>
    </div>
</div>

    <hr>
    <div id="listaProductos"></div>
</div>

<div class="footer">
    <div class="total-area">
        <span style="font-size: 0.8rem; color: var(--gray-med);">TOTAL A COBRAR</span>
        <span id="totalFinal">$0</span>
    </div>
    <button class="btn-print" onclick="generarPDF()">Generar Factura PDF</button>
</div>

<script src="script.js"></script>
</body>
</html>
